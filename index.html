let INVENTORY=[];
(function(){
  const lines=RAW.split('\n');
  for(const l of lines){
    const p=l.split('\t');
    if(p.length===3) INVENTORY.push([p[0],p[1],parseInt(p[2])]);
  }
})();
const ICONS={'TV':'📺','OLED':'📺','QLED':'📺','JBL':'🎵','BOSE':'🎵','TUNE':'🎧','BUDS':'🎧','HEADPHONE':'🎧','APPLE':'🍎','IPHONE':'📱','IPAD':'📱','MACBOOK':'💻','SAMSUNG':'📱','HUAWEI':'📱','XIAOMI':'📱','LAPTOP':'💻','NOTEBOOK':'💻','CAMERA':'📷','GAMING':'🎮','PLAYSTATION':'🎮','XBOX':'🎮','NINTENDO':'🎮','STOFZUIGER':'🧹','WATCH':'⌚'};
function getIcon(n){n=n.toUpperCase();for(const[k,v]of Object.entries(ICONS))if(n.includes(k))return v;return'📦'}
function getSection(z){for(const s of ZONES)if(z>=s[0]&&z<=s[1])return s[2];return null}
function switchTab(t,b){document.querySelectorAll('.sb').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById('panel-'+t).classList.add('active')}
function searchArtikel(){
  const a=document.getElementById('inp-artnr').value.trim().toLowerCase();
  const t=document.getElementById('inp-type').value.trim().toLowerCase();
  const d=document.getElementById('artikel-results');
  if(!a&&!t){d.innerHTML='<div class="es"><span class="ei">🔎</span><div class="et">Zoek een artikel</div><div class="es2">Voer een artikelnummer of typenaam in</div></div>';return}
  const res=INVENTORY.filter(r=>(!a||r[0].toLowerCase().includes(a))&&(!t||r[1].toLowerCase().includes(t)));
  if(!res.length){d.innerHTML='<div class="nr"><span>🤷</span><p>Geen resultaten</p></div>';return}
  const groups={};
  for(const r of res){const k=r[0];if(!groups[k])groups[k]={name:r[1],zones:[]};groups[k].zones.push(r[2]);}
  const uniq=Object.entries(groups);
  const lim=200,shown=uniq.slice(0,lim);
  let h=`<div class="zib"><div class="zin">${res.length}</div><div><div class="zil">Totaal tellingen</div><div class="zis">${uniq.length} uniek artikel${uniq.length!==1?'en':''}</div></div></div>`;
  h+=`<div class="rc"><div class="rh">Resultaten <span class="cp">${uniq.length}${uniq.length>lim?'+':''}</span></div>`;
  for(const[artnr,v] of shown){
    const zoneCounts={};for(const z of v.zones)zoneCounts[z]=(zoneCounts[z]||0)+1;
    const zoneSorted=Object.entries(zoneCounts).sort((a,b)=>a[0]-b[0]);
    const zoneBadges=zoneSorted.map(([z,c])=>`<div class="zc" style="padding:4px 10px;min-width:auto"><span class="zcl">Zone ${z}</span><span class="zcn" style="font-size:18px">${c}×</span></div>`).join('');
    h+=`<div class="rr"><div class="ri">${getIcon(v.name)}</div><div class="rn"><div class="rna">${v.name}</div><div class="rar">Art.nr. ${artnr}</div><div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:7px">${zoneBadges}</div></div></div>`;
  }
  d.innerHTML=h+'</div>';
}
function searchZone(){
  const zi=document.getElementById('inp-zone').value.trim();
  const d=document.getElementById('zone-results');
  if(!zi){d.innerHTML='<div class="es"><span class="ei">📍</span><div class="et">Zoek een zone</div><div class="es2">Voer een zonenummer in</div></div>';return}
  const z=parseInt(zi);
  if(isNaN(z)){d.innerHTML='<div class="nr"><span>❓</span><p>Voer een geldig zonenummer in</p></div>';return}
  const sec=getSection(z),res=INVENTORY.filter(r=>r[2]===z);
  if(!res.length){d.innerHTML=`<div class="nr"><span>🤷</span><p>Geen artikelen in zone ${z}</p></div>`;return}
  let h=`<div class="zib"><div class="zin">${res.length}</div><div><div class="zil">Geteld in zone ${z}</div>${sec?`<div class="zis">${sec}</div>`:''}</div></div>`;
  const counts={};for(const r of res){const k=r[0];counts[k]=(counts[k]||{name:r[1],count:0});counts[k].count++;}
  const uniq=Object.entries(counts);
  h+=`<div class="rc"><div class="rh">Zone ${z} <span class="cp">${res.length}</span></div><table class="zt"><thead><tr><th>Art.nr.</th><th>Merk / Type</th><th style="text-align:center">Telling</th></tr></thead><tbody>`;
  for(const[artnr,v] of uniq) h+=`<tr><td>${artnr}</td><td>${v.name}</td><td style="text-align:center;font-weight:700;color:var(--red)">${v.count}</td></tr>`;
  d.innerHTML=h+'</tbody></table></div>';
}
